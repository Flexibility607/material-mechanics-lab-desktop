<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="title desc">
  <title id="title">铸铁压缩曲线</title>
  <desc id="desc">铸铁压缩曲线持续非线性上升，在峰值附近突然破坏，无明显屈服阶段。</desc>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#111827"/></marker></defs>
  <rect width="720" height="430" fill="#fff"/>
  <g fill="none" stroke="#111827" stroke-linecap="round">
    <path d="M110 350 V55 M110 350 H650" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M110 350 C141 292 177 231 219 184 C264 132 318 96 385 80 C430 69 468 70 500 82" stroke="#0f766e" stroke-width="5"/>
    <circle cx="500" cy="82" r="7" fill="#0f766e"/>
    <path d="M500 82 V350" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 7"/>
  </g>
  <g font-family="Times New Roman, SimSun, serif" fill="#111827" font-size="25">
    <text x="76" y="58">σ</text><text x="640" y="392">ε</text><text x="515" y="86">破坏</text><text x="202" y="389">无明显屈服阶段</text>
  </g>
</svg>
