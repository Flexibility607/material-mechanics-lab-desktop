<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" role="img" aria-labelledby="title desc">
  <title id="title">低碳钢拉伸应力—应变曲线</title>
  <desc id="desc">标出比例极限、上下屈服点、冷作硬化卸载点、强度极限和断裂点的低碳钢应力应变曲线。</desc>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#111827"/></marker></defs>
  <rect width="800" height="470" fill="#fff"/>
  <g fill="none" stroke="#111827" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 390 V55 M115 390 H720" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M115 390 L205 178 C216 151 228 166 238 141 C250 121 263 181 277 158 C291 136 306 177 321 158 C374 119 432 96 505 82 C557 72 605 77 638 100 C662 118 679 142 694 160" stroke="#0f766e" stroke-width="5"/>
    <path d="M478 91 L347 390" stroke="#475569" stroke-width="3"/>
    <path d="M115 248 H205 M115 178 H205 M115 141 H238 M115 82 H505" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 7"/>
  </g>
  <g font-family="Times New Roman, SimSun, serif" fill="#111827" font-size="24">
    <text x="78" y="58">σ</text><text x="716" y="427">ε</text>
    <text x="62" y="257">σₚ</text><text x="62" y="187">σₛ</text><text x="62" y="91">σᵦ</text>
    <text x="190" y="270">A</text><text x="222" y="126">B</text><text x="265" y="204">B′</text><text x="474" y="120">C</text><text x="503" y="66">D</text><text x="695" y="151">E</text>
    <text x="360" y="420">卸载后残余应变</text>
  </g>
</svg>
