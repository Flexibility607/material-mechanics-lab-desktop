name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packager
        run: python -m pip install --disable-pip-version-check pyinstaller

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: pnpm
          cache-dependency-path: MaterialMechanicsLab/pnpm-lock.yaml

      - name: Verify release tag
        shell: pwsh
        run: |
          $version = (Get-Content -Raw MaterialMechanicsLab/package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version."
          }

      - name: Build installer
        shell: pwsh
        run: |
          $env:CODEX_PYTHON = (Get-Command python).Source
          ./MaterialMechanicsLab/build_installer.ps1

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            MaterialMechanicsLab/dist/MaterialMechanicsLab-Setup.exe `
            MaterialMechanicsLab/dist/SHA256SUMS.txt `
            --title "材料力学实验报告助手 ${{ github.ref_name }}" `
            --generate-notes
